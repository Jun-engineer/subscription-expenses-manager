name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app" 
          --health-interval 5s 
          --health-timeout 5s 
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://app:app@localhost:5432/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Start API
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > .uvicorn.ci.out 2>&1 &
          echo $! > .uvicorn.pid
      - name: Wait for API
        run: |
          for i in {1..60}; do curl -fsS http://localhost:8000/health && exit 0; sleep 1; done; echo "API failed to start"; tail -n 200 backend/.uvicorn.ci.out; exit 1
      - name: Run tests
        env:
          API_BASE: http://localhost:8000
        working-directory: backend
        run: pytest -q
      - name: Show API logs on failure
        if: failure()
        run: tail -n 200 backend/.uvicorn.ci.out || true